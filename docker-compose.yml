services:
  postgres:
    image: postgres:16-alpine
    container_name: truedata_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-truedata}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
      POSTGRES_DB: ${POSTGRES_DB:-truedata}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U truedata"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: truedata_backend
    environment:
      ENVIRONMENT: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-truedata}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}@postgres:5432/${POSTGRES_DB:-truedata}
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY must be set in .env}
      BACKEND_CORS_ORIGINS: ${BACKEND_CORS_ORIGINS:-*}
      STORAGE_BACKEND: ${STORAGE_BACKEND:-local}
      STORAGE_ROOT: ${STORAGE_ROOT:-storage}
      SEED_ADMIN_EMAIL: ${SEED_ADMIN_EMAIL:-admin@truedata.local}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:?SEED_ADMIN_PASSWORD must be set in .env}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - storage_data:/app/storage

  frontend:
    build: ./frontend
    container_name: truedata_frontend
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  postgres_data:
  storage_data:
